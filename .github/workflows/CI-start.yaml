name: Secure CI

on:
  push:
    branches: [main, features]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash --noprofile --norc -Eeuo pipefail {0}  # Strict bash

jobs:
  checks:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
      security-events: write
    steps:
      - name: Assert runner OS
        run: |
          if [ "${RUNNER_OS}" != "Linux" ]; then
            echo "Unsupported OS: ${RUNNER_OS}"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v.4.3.1
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 
        with:
          python-version: "3.13"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip==25.3

      - name: Install dependencies
        run: |
          pip install --require-hashes -r requirements-dev.txt
          pip install --require-hashes -r requirements.txt
      
      - name: Verify commit (PR)
        if: |
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.fork == false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KEY_URL="https://github.com/${{ github.event.pull_request.head.repo.owner.login }}.gpg"
          curl -sL "$KEY_URL" | gpg --import
          git verify-commit ${{ github.event.pull_request.head.sha }}

      - name: Verify commit (push)
        if: github.event_name == 'push'
        run: |
          curl -sL "https://github.com/${{ github.repository_owner }}.gpg" | gpg --import
          git verify-commit ${{ github.sha }}

      - name: License Check
        run: |
          pip-licenses --format=json --output-file=licenses.json
          pip-licenses --fail-on="GPL;AGPL"

      - name: Install project
        run: pip install --no-deps -e .

      - name: Detect secrets (TruffleHog)
        uses: trufflesecurity/trufflehog@6961f2bace57ab32b23b3ba40f8f420f6bc7e004  # v3.93.3
        with:
          extra_args: --results=verified,unknown

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@1938557f6a58837331b99822ab17b8e536e7bef9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8c78abb9b62512e3c45dea6559ffd924ed8549c8
        with:
          languages: python

      - name: Perform CodeQL Analysis  # Without Automatic Analysis 
        uses: github/codeql-action/analyze@8c78abb9b62512e3c45dea6559ffd924ed8549c8

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  tests:  
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v.4.3.1

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --require-hashes -r requirements-dev.txt
          pip install --require-hashes -r requirements.txt

      - name: Run tests  # Fixed typo
        env:
          PYTHONHASHSEED: "0"
        run: pytest -q --disable-warnings --maxfail=1

  security: 
    needs: [checks, tests]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v.4.3.1

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 
        with:
          python-version: "3.13"
          cache: pip

      - name: Install audit tools
        run: pip install --require-hashes -r requirements-dev.txt

      - name: Bandit Scan
        if: github.event_name == 'push' || github.event.pull_request.head.repo.fork == false
        run: bandit -r . -ll -ii --exclude ./tests

      - name: Dependencies audit
        run: |
          pip-audit --strict -r requirements-dev.txt
          pip-audit --strict -r requirements.txt

      - name: Semgrep Security Scan
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -e SEMGREP_RULES="p/security-audit p/secrets p/owasp-top-ten p/python" \
            semgrep/semgrep@sha256:769691ce8da259c570a1d5ecd00e8cbc7c97d98ef1837b26b09726cb57af2890 \
            semgrep scan --config auto --error /src

      - name: Trivy FS scan
        run: |
          curl -fsSL -o trivy.tar.gz \
            https://github.com/aquasecurity/trivy/releases/download/v0.69.3/trivy_0.69.3_Linux-64bit.tar.gz
          echo "1816b632dfe529869c740c0913e36bd1629cb7688bd5634f4a858c1d57c88b75  trivy.tar.gz" | sha256sum -c
          tar -xzf trivy.tar.gz trivy
          ./trivy fs \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --ignore-unfixed \
            .
  
  dependency_guard:
    needs: security
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v.4.3.1

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 
        with:
          python-version: "3.13"
          cache: pip

      - name: Detect dependency change
        run: |
          if git diff --name-only origin/${{ github.base_ref }} | grep -E 'requirements|pyproject'; then
            echo "DEPENDENCY_CHANGED=true" >> $GITHUB_ENV
          fi

      - name: Warn dependency change
        if: env.DEPENDENCY_CHANGED == 'true'
        run: echo "::warning::Dependency change requires review"

  build: # Containers
    needs: [security, dependency_guard]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.security.result == 'success' &&
      (needs.dependency_guard.result == 'success' || needs.dependency_guard.result == 'skipped')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
      packages: write
    outputs:
      pushed_digest: ${{ steps.push_image.outputs.pushed_digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v.4.3.1

      - name: Setup Python for Vendoring
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 
        with:
          cache: pip
          python-version: 3.13

      - name: Download dependencies (Vendoring)
        run: |
          mkdir wheels
          pip download -r requirements.txt -d wheels --require-hashes

      - name: Install conftest
        env:
          CONFTEST_VERSION: "0.66.0"
        run: |
          curl -L -o conftest.tar.gz \
            "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          echo "7e717adada4ca64e600bdb86b789cbcc279215b3296e238bc291acbb81361d6f  conftest.tar.gz" | sha256sum -c
          tar xzf conftest.tar.gz conftest
          mv conftest /usr/local/bin/
          rm conftest.tar.gz

      - name: Login to GHCR
        if: github.event_name == 'push'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Check Dockerfile policy
        run: conftest test Dockerfile --policy policy/

      - name: Build Image
        id: build_image 
        if: github.event_name == 'push'
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build \
            --network=none \
            --pull=true \
            --no-cache \
            --build-arg PIP_FIND_LINKS=/app/wheels \
            -t ghcr.io/${REPO}:${{ github.sha }} \
            --metadata-file build-metadata.json \
            .
          BUILD_DIGEST=$(jq -r '."containerimage.digest"' build-metadata.json)
          echo "build_digest=${BUILD_DIGEST}" >> $GITHUB_OUTPUT

      - name: Trivy Image Scan
        if: github.event_name == 'push'
        run: |
          curl -fsSL -o trivy.tar.gz \
            https://github.com/aquasecurity/trivy/releases/download/v0.69.3/trivy_0.69.3_Linux-64bit.tar.gz
          echo "1816b632dfe529869c740c0913e36bd1629cb7688bd5634f4a858c1d57c88b75  trivy.tar.gz" | sha256sum -c
          tar -xzf trivy.tar.gz trivy
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          ./trivy image \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --ignore-unfixed \
            ghcr.io/${REPO}:${{ github.sha }}

      - name: Push image
        id: push_image
        if: github.event_name == 'push'
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker push ghcr.io/${REPO}:${{ github.sha }}
          # Получаем digest из registry сразу после push
          PUSHED_DIGEST=$(docker buildx imagetools inspect \
            ghcr.io/${REPO}:${{ github.sha }} \
            --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "pushed_digest=${PUSHED_DIGEST}" >> $GITHUB_OUTPUT

  attest_and_signing:  
    needs: build
    environment: production
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.build.result == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
      id-token: write
      packages: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v.4.3.1

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Cosign
        uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62 # v3.10.0

      - name: Get digest from registry
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          DIGEST=$(docker buildx imagetools inspect ghcr.io/${REPO}:${{ github.sha }} \
            --format '{{json .Manifest.Digest}}' | tr -d '"')
          if [ -z "$DIGEST" ]; then
            echo "ERROR: Failed to get image digest"
            exit 1
          fi
          echo "DIGEST=$DIGEST" >> $GITHUB_ENV
          echo "REPO=${REPO}" >> $GITHUB_ENV

      - name: Verify image integrity
        run: |
          PUSHED="${{ needs.build.outputs.pushed_digest }}"
          REGISTRY="${{ env.DIGEST }}"
          if [ "${PUSHED}" != "${REGISTRY}" ]; then
            echo "ERROR: Image digest mismatch!"
            echo "Pushed:   ${PUSHED}"
            echo "Registry: ${REGISTRY}"
            exit 1
          fi
          echo "Digest verified: ${REGISTRY}"

      - name: Generate SBOM
        run: |
          pip install --require-hashes -r requirements-sbom.txt
          cyclonedx-py requirements requirements.txt -o sbom.json

      - name: Attest SBOM
        run: |
          cosign attest \
            --yes \
            --predicate sbom.json \
            --type cyclonedx \
            ghcr.io/${{ env.REPO }}@${{ env.DIGEST }}

      - name: SLSA
        if: github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f
        with:
          subject-name: ghcr.io/${{ env.REPO }}
          subject-digest: ${{ env.DIGEST }}
          push-to-registry: true

      - name: Sign image (keyless)
        if: github.ref == 'refs/heads/main'
        run: |
          cosign sign \
            --yes \
            ghcr.io/${{ env.REPO }}@${{ env.DIGEST }}

      - name: Cosign verify
        run: |
          cosign verify \
          --certificate-identity-regexp="https://github.com/${{ github.repository }}/*" \
          --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
          ghcr.io/${{ env.REPO }}@${{ env.DIGEST }}