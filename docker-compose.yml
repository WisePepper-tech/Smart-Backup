services:
  minio:
    image: minio/minio:latest
    container_name: smart-backup-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  smart-backup:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PIP_FIND_LINKS: /app/wheels
    image: smart-backup:v1.0.0
    container_name: smart-backup-app
    depends_on:
      minio:
        condition: service_healthy
    stdin_open: true # -i
    tty: true # -t
    env_file: .env
    environment:
      - DOCKER_MODE=true
    networks:
      - default

volumes:
  minio_data:
