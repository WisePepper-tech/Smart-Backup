apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smart-backup
  namespace: smart-backup
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod

spec:
  tls:
  - hosts:
    - backup.yourdomain.com
    secretName: smart-backup-tls

  rules:
  - host: backup.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: smart-backup-api
            port:
              number: 80