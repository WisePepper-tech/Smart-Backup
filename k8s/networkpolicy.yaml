apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: smart-backup-policy
  namespace: smart-backup
spec:
  podSelector:
    matchLabels:
      app: smart-backup

  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8000

  egress:
    - to:
        - podSelector:
            matchLabels:
              app: minio
      ports:
        - port: 9000

    - to: []
      ports:
        - port: 53
          protocol: UDP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: minio-policy
  namespace: smart-backup
spec:
  podSelector:
    matchLabels:
      app: minio

  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: smart-backup
      ports:
        - port: 9000

  egress: []